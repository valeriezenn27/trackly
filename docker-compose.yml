services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracklydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - trackly-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracklydb"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build:
      context: .
      dockerfile: backend/Trackly.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TracklyDatabase: Host=postgres;Port=5432;Database=tracklydb;Username=postgres;Password=password
      AllowedOrigins__0: http://localhost:4200
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
  web:
    build:
      context: .
      dockerfile: frontend/trackly-web/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
volumes:
  trackly-data:
